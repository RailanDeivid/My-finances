services:
  db:
    image: postgres:15
    container_name: my-finances-db
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: my-finances-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: my-finances-evolution
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/evolutionDB
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      SERVER_TYPE: http
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_URL: http://web:8000/webhook/whatsapp/
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      QRCODE_LIMIT: 30
      LOG_LEVEL: ERROR

  web:
    build: .
    container_name: my-finances-web
    restart: always
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --worker-class gthread --workers 2 --threads 4 --timeout 120 --keep-alive 5"

  nginx:
    image: nginx:1.25-alpine
    container_name: my-finances-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: my-finances-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    env_file: .env.prod
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - nginx

  monitor:
    build:
      context: .
      dockerfile: scripts/Dockerfile.monitor
    container_name: my-finances-monitor
    restart: always
    env_file: .env.prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
      - /home/ubuntu/.oci/oci_api_key.pem:/app/oci_key.pem:ro
    depends_on:
      - web

volumes:
  postgres_data:
    name: my-finances-postgres-data
    external: true
  redis_data:
    name: my-finances-redis-data
  static_volume:
