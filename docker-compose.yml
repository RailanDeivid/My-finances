services:
  db:
    image: postgres:15
    container_name: my-finances-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myfinancesDB}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myfinancesDB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: my-finances-web
    command: python manage.py runserver 0.0.0.0:8000  # sobrescreve gunicorn apenas em dev
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

volumes:
  postgres_data:
    name: my-finances-postgres-data
    external: true
