<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;">
  <div style="width:80px;height:80px;border-radius:50%;background:var(--card-bg);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
    <i data-lucide="{{ es_icon }}" style="width:36px;height:36px;color:var(--text-muted);"></i>
  </div>
  <h3 style="margin:0 0 8px;font-size:20px;font-weight:600;color:var(--text);">{{ es_title }}</h3>
  <p style="margin:0 0 28px;color:var(--text-muted);font-size:14px;max-width:340px;line-height:1.6;">{{ es_description }}</p>
  <a href="{{ es_url }}" class="btn btn-primary">
    <i data-lucide="plus"></i> {{ es_button }}
  </a>
</div>
