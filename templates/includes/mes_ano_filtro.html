<form method="get" class="mes-filtro">
  <label>{{ filtro_label|default:"Mês/Ano:" }}</label>
  <select name="mes" class="auto-submit">
    {% include 'includes/mes_options.html' with mes_sel=mes %}
  </select>
  <select name="ano" class="auto-submit">
    {% for y in anos_lista %}
    <option value="{{ y }}" {% if ano == y or ano == y|stringformat:"s" %}selected{% endif %}>{{ y }}</option>
    {% endfor %}
  </select>
</form>
