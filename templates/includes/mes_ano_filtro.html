<form method="get" class="mes-filtro">
  <label>{{ filtro_label|default:"Mês/Ano:" }}</label>
  <select name="mes" class="auto-submit">
    <option value="1"  {% if mes == 1  or mes == "1"  %}selected{% endif %}>Janeiro</option>
    <option value="2"  {% if mes == 2  or mes == "2"  %}selected{% endif %}>Fevereiro</option>
    <option value="3"  {% if mes == 3  or mes == "3"  %}selected{% endif %}>Março</option>
    <option value="4"  {% if mes == 4  or mes == "4"  %}selected{% endif %}>Abril</option>
    <option value="5"  {% if mes == 5  or mes == "5"  %}selected{% endif %}>Maio</option>
    <option value="6"  {% if mes == 6  or mes == "6"  %}selected{% endif %}>Junho</option>
    <option value="7"  {% if mes == 7  or mes == "7"  %}selected{% endif %}>Julho</option>
    <option value="8"  {% if mes == 8  or mes == "8"  %}selected{% endif %}>Agosto</option>
    <option value="9"  {% if mes == 9  or mes == "9"  %}selected{% endif %}>Setembro</option>
    <option value="10" {% if mes == 10 or mes == "10" %}selected{% endif %}>Outubro</option>
    <option value="11" {% if mes == 11 or mes == "11" %}selected{% endif %}>Novembro</option>
    <option value="12" {% if mes == 12 or mes == "12" %}selected{% endif %}>Dezembro</option>
  </select>
  <select name="ano" class="auto-submit">
    <option value="2024" {% if ano == 2024 or ano == "2024" %}selected{% endif %}>2024</option>
    <option value="2025" {% if ano == 2025 or ano == "2025" %}selected{% endif %}>2025</option>
    <option value="2026" {% if ano == 2026 or ano == "2026" %}selected{% endif %}>2026</option>
    <option value="2027" {% if ano == 2027 or ano == "2027" %}selected{% endif %}>2027</option>
  </select>
</form>
