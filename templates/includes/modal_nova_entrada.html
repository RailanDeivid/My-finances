<!-- Modal: Nova Entrada -->
<div id="modal-nova-entrada"
     role="dialog" aria-modal="true" aria-labelledby="modal-nova-entrada-title"
     style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);
            align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;"
     onclick="if(event.target===this)event.stopPropagation()">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
              width:100%;max-width:480px;margin:auto;box-shadow:0 24px 48px rgba(0,0,0,0.4);">

    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:18px 24px;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:36px;height:36px;border-radius:8px;background:#22c55e20;
                     display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i data-lucide="banknote-arrow-up" style="width:18px;height:18px;stroke:#22c55e;"></i>
        </span>
        <h3 id="modal-nova-entrada-title" style="margin:0;font-size:16px;font-weight:700;color:var(--text-primary);">Nova Entrada</h3>
      </div>
      <button onclick="closeFormModal('modal-nova-entrada')" aria-label="Fechar modal"
              style="background:none;border:none;cursor:pointer;color:var(--text-muted);
                     font-size:24px;line-height:1;padding:0 4px;">&times;</button>
    </div>

    <form method="post" action="{% url 'entrada-create' %}" style="padding:20px 24px;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">

      <div class="form-group">
        <label class="form-label" for="me_tipo">Tipo *</label>
        <select name="tipo" id="me_tipo" class="form-control" required>
          {% for val, label in modal_entrada_form.tipo.field.choices %}
          {% if val and val != "saldo_anterior" %}<option value="{{ val }}">{{ label }}</option>{% endif %}
          {% endfor %}
        </select>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label" for="me_valor">Valor (R$) *</label>
          <input type="number" name="valor" id="me_valor" class="form-control"
                 step="0.01" placeholder="0,00" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="me_data" id="me_data_label">Data *</label>
          <input type="date" name="data" id="me_data" class="form-control" required>
        </div>
      </div>

      <!-- Recorrente -->
      <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;
                  padding:12px 16px;margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;margin:0;">
          <input type="checkbox" name="recorrente" id="me_recorrente"
                 style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;"
                 onchange="meToggleRecorrente(this.checked)">
          <span style="font-size:13px;font-weight:600;color:var(--text);">
            <i data-lucide="repeat" style="width:14px;height:14px;vertical-align:-2px;stroke:var(--accent);margin-right:4px;"></i>
            Repetir todo mês (recorrente)
          </span>
        </label>
        <div id="me_recorrente_hint" style="display:none;margin-top:8px;font-size:12px;color:var(--text-muted);line-height:1.5;">
          <i data-lucide="info" style="width:11px;height:11px;vertical-align:middle;"></i>
          A <strong>data</strong> define o <strong>mês inicial</strong>. O sistema vai gerar automaticamente uma entrada para cada mês seguinte até dez/2050.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="me_conta">Conta</label>
        <select name="conta" id="me_conta" class="form-control">
          <option value="">— Sem conta —</option>
          {% for c in contas_ativas %}
          <option value="{{ c.pk }}">{{ c.nome }}{% if c.banco %} ({{ c.banco }}){% endif %}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="me_responsavel">Responsável</label>
        <select name="responsavel" id="me_responsavel" class="form-control">
          <option value="">— Sem responsável —</option>
          {% if responsavel_principal %}
          <option value="{{ responsavel_principal.pk }}" selected>{{ responsavel_principal.nome }}</option>
          {% endif %}
          {% for r in responsaveis_ativos %}
          <option value="{{ r.pk }}">{{ r.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="me_descricao">Descrição</label>
        <input type="text" name="descricao" id="me_descricao" class="form-control"
               placeholder="Ex: Salário junho...">
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button type="button" onclick="closeFormModal('modal-nova-entrada')" class="btn btn-danger">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          <i data-lucide="save"></i> Salvar Entrada
        </button>
      </div>
    </form>
  </div>
</div>
