<!-- Modal: Novo Gasto -->
<div id="modal-novo-gasto"
     style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);
            align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;"
     onclick="if(event.target===this)event.stopPropagation()">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
              width:100%;max-width:540px;margin:auto;box-shadow:0 24px 48px rgba(0,0,0,0.4);
              display:flex;flex-direction:column;max-height:calc(100vh - 48px);">

    <!-- Cabeçalho fixo -->
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:18px 24px;border-bottom:1px solid var(--border);
                position:sticky;top:0;background:var(--bg-card);z-index:1;
                border-radius:16px 16px 0 0;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:36px;height:36px;border-radius:8px;background:#ef444420;
                     display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i data-lucide="banknote-arrow-down" style="width:18px;height:18px;stroke:#ef4444;"></i>
        </span>
        <h3 style="margin:0;font-size:16px;font-weight:700;color:var(--text-primary);">Novo Gasto</h3>
      </div>
      <button onclick="closeFormModal('modal-novo-gasto')"
              style="background:none;border:none;cursor:pointer;color:var(--text-muted);
                     font-size:24px;line-height:1;padding:0 4px;">&times;</button>
    </div>

    <!-- Corpo com scroll -->
    <form method="post" action="{% url 'gasto-create' %}" autocomplete="off"
          style="padding:20px 24px;overflow-y:auto;flex:1;min-height:0;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">

      <div class="form-group" id="mg-responsavel-row">
        <label class="form-label" for="mg_responsavel">Responsável *</label>
        <select name="responsavel" id="mg_responsavel" class="form-control">
          <option value="">— Selecione —</option>
          {% for r in modal_gasto_form.responsavel.field.queryset %}
          <option value="{{ r.pk }}" {% if r.pk == responsavel_principal.pk %}selected{% endif %}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="mg_tipo_pagamento">Tipo de Pagamento *</label>
        <select name="tipo_pagamento" id="mg_tipo_pagamento" class="form-control" required
                onchange="mgGastoTipoToggle(this.value)">
          {% for val, label in modal_gasto_form.tipo_pagamento.field.choices %}
          {% if val %}<option value="{{ val }}">{{ label }}</option>{% endif %}
          {% endfor %}
        </select>
      </div>

      <div class="form-group" id="mg-cartao-row">
        <label class="form-label" for="mg_cartao">Cartão *</label>
        <select name="cartao" id="mg_cartao" class="form-control">
          <option value="">— Sem cartão —</option>
          {% for c in modal_gasto_form.cartao.field.queryset %}
          <option value="{{ c.pk }}">{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div id="mg-cartao-adicional-row" style="margin-bottom:12px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;">
          <input type="checkbox" name="cartao_adicional" id="mg_cartao_adicional"
                 style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;">
          <span style="font-size:13px;color:var(--text);">
            <i data-lucide="credit-card" style="width:13px;height:13px;vertical-align:-1px;stroke:var(--accent);margin-right:3px;"></i>
            Cartão Adicional
          </span>
        </label>
      </div>

      <div class="form-group" id="mg-ajuste-tipo-row" style="display:none;">
        <label class="form-label" for="mg_ajuste_tipo">Tipo do Ajuste *</label>
        <select name="ajuste_tipo" id="mg_ajuste_tipo" class="form-control" disabled>
          <option value="">— Selecione —</option>
          <option value="desconto">− Desconto (subtrai da fatura)</option>
          <option value="adicao">+ Adição (soma à fatura)</option>
        </select>
      </div>

      <div class="form-group" id="mg-conta-origem-row" style="display:none;">
        <label class="form-label" for="mg_conta_origem">Conta de Débito *</label>
        <select name="conta_origem" id="mg_conta_origem" class="form-control" disabled>
          <option value="">— Selecione a conta —</option>
          {% for c in modal_gasto_form.conta_origem.field.queryset %}
          <option value="{{ c.pk }}">{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="mg_descricao">Descrição *</label>
        <input type="text" name="descricao" id="mg_descricao" class="form-control"
               placeholder="Ex: Mercado, Farmácia..." required>
      </div>

      <!-- Grid: Valor + Parcelas + Data -->
      <div id="mg-grid-valores" class="form-grid-2">
        <div class="form-group" style="grid-column:1;grid-row:1;">
          <label class="form-label" for="mg_valor_total" id="mg_label_valor">Valor Total (R$) *</label>
          <input type="number" name="valor_total" id="mg_valor_total" class="form-control"
                 step="0.01" placeholder="0,00" required>
        </div>
        <div class="form-group" id="mg-parcelas-row" style="grid-column:2;grid-row:1;display:none;">
          <label class="form-label" for="mg_total_parcelas">Nº de Parcelas *</label>
          <input type="number" name="total_parcelas" id="mg_total_parcelas" class="form-control"
                 min="2" max="60" disabled>
        </div>
        <div class="form-group" id="mg-data-row" style="grid-column:2;grid-row:1;">
          <label class="form-label" for="mg_data_compra">Data da Compra *</label>
          <input type="date" name="data_compra" id="mg_data_compra" class="form-control" required>
        </div>
      </div>

      <!-- Total da compra parcelada -->
      <div id="mg-total-calculado" style="display:none;margin:-4px 0 16px;padding:8px 14px;background:var(--accent)15;border:1px solid var(--accent)33;border-radius:8px;font-size:13px;font-weight:600;color:var(--accent);"></div>

      <div id="mg-inicio-row" style="display:none;margin-bottom:16px;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:12px 16px;">
          <div id="mg-inicio-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;">
            Mês de início das parcelas
          </div>
          <div class="form-grid-2">
            <div>
              <label class="form-label" for="mg_mes_inicio">Mês da 1ª Parcela</label>
              <select name="mes_inicio" id="mg_mes_inicio" class="form-control" onchange="mgAtualizarPreview();mgSyncDataFromFatura();" disabled>
                {% for val, label in modal_gasto_form.mes_inicio.field.choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div>
              <label class="form-label" for="mg_ano_inicio">Ano</label>
              <select name="ano_inicio" id="mg_ano_inicio" class="form-control" onchange="mgAtualizarPreview();mgSyncDataFromFatura();" disabled>
                {% for val, label in modal_gasto_form.ano_inicio.field.choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div id="mg-preview-parcelas" style="display:none;margin-top:10px;align-items:center;flex-wrap:wrap;gap:6px;">
            <span id="mg-pp-primeira" style="font-size:12px;font-weight:600;color:var(--accent);"></span>
            <span id="mg-pp-arrow" style="font-size:12px;color:var(--text-muted);">→</span>
            <span id="mg-pp-ultima"  style="font-size:12px;font-weight:600;color:var(--accent);"></span>
            <span id="mg-pp-total"   style="font-size:11px;background:var(--accent)20;color:var(--accent);border-radius:4px;padding:1px 6px;"></span>
          </div>
        </div>
      </div>

      <!-- Categoria + botão nova categoria -->
      <div class="form-group">
        <label class="form-label" for="mg_categoria">Categoria</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select name="categoria" id="mg_categoria" class="form-control" style="flex:1;">
            <option value="">— Sem categoria —</option>
            {% for c in modal_gasto_form.categoria.field.queryset %}
            <option value="{{ c.pk }}">{{ c.nome }}</option>
            {% endfor %}
          </select>
          <button type="button" onclick="mgAbrirNovaCategoria()"
                  title="Criar nova categoria"
                  style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;
                         background:var(--bg-secondary);cursor:pointer;color:var(--accent);
                         display:flex;align-items:center;flex-shrink:0;">
            <i data-lucide="plus" style="width:16px;height:16px;"></i>
          </button>
        </div>

        <!-- ── Mini-form de nova categoria ── -->
        <div id="mg-nova-cat-form" style="display:none;margin-top:10px;background:var(--bg-secondary);
             border:1px solid var(--accent)44;border-radius:10px;padding:14px;">

          <!-- Preview ao vivo -->
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;
                      background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px;">
            <div id="mg-cat-preview-wrap" style="width:36px;height:36px;border-radius:8px;background:#888888;
                 display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <i data-lucide="tag" style="width:18px;height:18px;stroke:#fff;"></i>
            </div>
            <div>
              <div style="font-weight:600;font-size:13px;" id="mg-cat-preview-nome">Nome da categoria</div>
              <div style="font-size:11px;color:var(--text-muted);">Prévia</div>
            </div>
          </div>

          <!-- Preset rápido -->
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label" style="font-size:12px;">Preset rápido</label>
            <select id="mg-cat-preset" class="form-control" style="font-size:13px;"
                    onchange="mgCatAplicarPreset(this)">
              <option value="">— Selecione ou preencha abaixo —</option>
              {% for nome, icone, cor in cat_presets %}
              <option value="{{ nome }}" data-icone="{{ icone }}" data-cor="{{ cor }}">{{ nome }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Nome -->
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label" style="font-size:12px;">Nome *</label>
            <input type="text" id="mg_nova_cat_nome" class="form-control" style="font-size:13px;"
                   placeholder="Nome da categoria..."
                   oninput="mgCatAtualizarPreviewNome(this.value)"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();mgSalvarNovaCategoria();}">
          </div>

          <!-- Ícone -->
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label" style="font-size:12px;">Ícone</label>
            <div id="mg-cat-icone-grid"
                 style="display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));
                        gap:5px;max-height:180px;overflow-y:auto;padding-right:2px;margin-top:6px;">
              {% for valor, nome in cat_icones %}
              <button type="button" class="mg-cat-icone-btn"
                      data-valor="{{ valor }}" title="{{ nome }}"
                      onclick="mgCatSelecionarIcone(this)">
                <i data-lucide="{{ valor }}"></i>
                <span class="mg-icone-label">{{ nome|truncatechars:10 }}</span>
              </button>
              {% endfor %}
            </div>
            <input type="hidden" id="mg_nova_cat_icone" value="">
          </div>

          <!-- Cor -->
          <div class="form-group" style="margin-bottom:12px;">
            <label class="form-label" style="font-size:12px;">Cor</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center;">
              {% for hex, nome in cat_cores %}
              <div class="mg-cat-cor-swatch {% if hex == '#888888' %}mg-selecionada{% endif %}"
                   style="background:{{ hex }};" title="{{ nome }}" data-hex="{{ hex }}"
                   onclick="mgCatSelecionarCor(this)"></div>
              {% endfor %}
              <!-- Cor personalizada -->
              <div id="mg-cat-cor-picker-btn" title="Cor personalizada"
                   style="width:26px;height:26px;border-radius:6px;border:2px dashed var(--border);
                          cursor:pointer;display:flex;align-items:center;justify-content:center;
                          background:var(--bg-card);position:relative;overflow:hidden;flex-shrink:0;">
                <i data-lucide="pipette" style="width:13px;height:13px;stroke:var(--text-muted);pointer-events:none;"></i>
                <input type="color" id="mg_nova_cat_cor" value="#888888"
                       style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;"
                       oninput="mgCatCorPersonalizada(this.value)">
              </div>
            </div>
            <input type="hidden" id="mg_nova_cat_cor_val" value="#888888">
          </div>

          <div style="display:flex;gap:6px;">
            <button type="button" id="mg-btn-salvar-cat" onclick="mgSalvarNovaCategoria()"
                    class="btn btn-primary" style="flex:1;font-size:13px;padding:7px 12px;">
              <i data-lucide="check" style="width:14px;height:14px;"></i> Criar Categoria
            </button>
            <button type="button" onclick="mgFecharNovaCategoria()"
                    class="btn" style="padding:7px 14px;font-size:13px;">
              Cancelar
            </button>
          </div>
          <div id="mg-nova-cat-erro" style="display:none;color:#ef4444;font-size:12px;margin-top:6px;"></div>
        </div>
      </div>

      <!-- Toggle Recorrente para PIX -->
      <div id="mg-pix-emp-rec-wrapper" style="display:none;margin-bottom:12px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;">
          <input type="checkbox" id="mg_pix_emp_rec_chk"
                 style="width:15px;height:15px;accent-color:var(--accent);"
                 onchange="mgTogglePixEmpRec(this.checked)">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);">
            <i data-lucide="repeat" style="width:13px;height:13px;vertical-align:-1px;stroke:var(--accent);margin-right:3px;"></i>
            Recorrente?
          </span>
        </label>
      </div>

      <!-- Compra Recorrente -->
      <div id="mg-recorrente-wrapper" style="display:none;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px;">
        <input type="checkbox" name="recorrente" id="mg_recorrente" style="display:none;">
        <div id="mg-recorrente-opcoes">
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label" style="font-size:12px;">Repetir por</label>
            <select name="recorrente_meses" id="mg_recorrente_meses" class="form-control" onchange="mgAtualizarRecorrenteInfo()">
              {% for val, label in modal_gasto_form.recorrente_meses.field.choices %}
              <option value="{{ val }}" {% if val == "12" %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div id="mg-recorrente-info" style="padding:8px 10px;background:#8b5cf611;border-radius:6px;font-size:12px;color:#a78bfa;">
            <i data-lucide="info" style="width:12px;height:12px;display:inline;vertical-align:middle;"></i>
            <span id="mg-recorrente-info-txt">Um gasto será gerado para cada um dos próximos 12 meses.</span>
          </div>
        </div>
      </div>

      <!-- Divisão de gastos -->
      <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0;">
          <input type="checkbox" name="dividir_gasto" id="mg_dividir_gasto" onchange="mgToggleDividir(this.checked)"
                 style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);">Dividir este gasto</span>
        </label>

        <div id="mg-dividir-opcoes" style="display:none;margin-top:12px;">
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label" style="font-size:12px;">Dividir com</label>
            <select name="dividir_com" id="mg_dividir_com" class="form-control" onchange="mgAtualizarDivisao()">
              <option value="">— Selecione o responsável —</option>
              {% for r in modal_gasto_form.dividir_com.field.queryset %}
              <option value="{{ r.pk }}">{{ r }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grid-2" style="margin-bottom:10px;">
            <div>
              <label class="form-label" style="font-size:12px;">Minha parte</label>
              <select name="pct_responsavel" id="mg_pct_responsavel" class="form-control" onchange="mgAtualizarDivisao()">
                {% for val, label in modal_gasto_form.pct_responsavel.field.choices %}
                <option value="{{ val }}" {% if val == "50" %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div>
              <label class="form-label" style="font-size:12px;color:var(--text-muted);">Parte de <span id="mg_label_dividir_com">quem divide</span></label>
              <div id="mg_pct_outro_display" style="height:38px;display:flex;align-items:center;font-weight:600;font-size:15px;color:var(--accent);">50%</div>
            </div>
          </div>

          <div style="height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-bottom:10px;">
            <div id="mg_barra_pct" style="height:100%;background:var(--accent);transition:width .2s;width:50%;"></div>
          </div>

          <div id="mg-divisao-preview" style="display:none;grid-template-columns:1fr 1fr;gap:10px;text-align:center;">
            <div style="background:var(--accent)11;border-radius:8px;padding:8px 10px;">
              <div style="font-size:11px;color:var(--text-muted);" id="mg_label_preview_meu">Você</div>
              <div style="font-size:16px;font-weight:800;color:var(--accent);" id="mg_valor_preview_meu">R$ —</div>
            </div>
            <div style="background:#818cf811;border-radius:8px;padding:8px 10px;">
              <div style="font-size:11px;color:var(--text-muted);" id="mg_label_preview_outro">Outro</div>
              <div style="font-size:16px;font-weight:800;color:#818cf8;" id="mg_valor_preview_outro">R$ —</div>
            </div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button type="button" onclick="closeFormModal('modal-novo-gasto')" class="btn btn-danger">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          <i data-lucide="save"></i> Salvar Gasto
        </button>
      </div>
    </form>
  </div>
</div>
