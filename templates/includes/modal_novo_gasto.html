<!-- Modal: Novo Gasto -->
<div id="modal-novo-gasto"
     style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);
            align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;"
     onclick="if(event.target===this)event.stopPropagation()">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
              width:100%;max-width:540px;margin:auto;box-shadow:0 24px 48px rgba(0,0,0,0.4);">

    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:18px 24px;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:36px;height:36px;border-radius:8px;background:#ef444420;
                     display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i data-lucide="banknote-arrow-down" style="width:18px;height:18px;stroke:#ef4444;"></i>
        </span>
        <h3 style="margin:0;font-size:16px;font-weight:700;color:var(--text-primary);">Novo Gasto</h3>
      </div>
      <button onclick="closeFormModal('modal-novo-gasto')"
              style="background:none;border:none;cursor:pointer;color:var(--text-muted);
                     font-size:24px;line-height:1;padding:0 4px;">&times;</button>
    </div>

    <form method="post" action="{% url 'gasto-create' %}" style="padding:20px 24px;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">

      <div class="form-group">
        <label class="form-label" for="mg_responsavel">Responsável *</label>
        <select name="responsavel" id="mg_responsavel" class="form-control" required>
          <option value="">— Selecione —</option>
          {% for r in modal_gasto_form.responsavel.field.queryset %}
          <option value="{{ r.pk }}">{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="mg_tipo_pagamento">Tipo de Pagamento *</label>
        <select name="tipo_pagamento" id="mg_tipo_pagamento" class="form-control" required
                onchange="mgGastoTipoToggle(this.value)">
          {% for val, label in modal_gasto_form.tipo_pagamento.field.choices %}
          {% if val %}<option value="{{ val }}">{{ label }}</option>{% endif %}
          {% endfor %}
        </select>
      </div>

      <div class="form-group" id="mg-cartao-row" style="display:none;">
        <label class="form-label" for="mg_cartao">Cartão *</label>
        <select name="cartao" id="mg_cartao" class="form-control">
          <option value="">— Sem cartão —</option>
          {% for c in modal_gasto_form.cartao.field.queryset %}
          <option value="{{ c.pk }}">{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="mg_descricao">Descrição *</label>
        <input type="text" name="descricao" id="mg_descricao" class="form-control"
               placeholder="Ex: Mercado, Farmácia..." required>
      </div>

      <!-- Grid: Valor + Parcelas + Data (posicionamento explícito por JS) -->
      <div id="mg-grid-valores" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group" style="grid-column:1;grid-row:1;">
          <label class="form-label" for="mg_valor_total" id="mg_label_valor">Valor Total (R$) *</label>
          <input type="number" name="valor_total" id="mg_valor_total" class="form-control"
                 step="0.01" placeholder="0,00" required>
        </div>
        <div class="form-group" id="mg-parcelas-row" style="grid-column:2;grid-row:1;display:none;">
          <label class="form-label" for="mg_total_parcelas">Nº de Parcelas *</label>
          <input type="number" name="total_parcelas" id="mg_total_parcelas" class="form-control"
                 min="2" max="60">
        </div>
        <div class="form-group" id="mg-data-row" style="grid-column:2;grid-row:1;">
          <label class="form-label" for="mg_data_compra">Data da Compra *</label>
          <input type="date" name="data_compra" id="mg_data_compra" class="form-control" required>
        </div>
      </div>

      <!-- Total da compra parcelada -->
      <div id="mg-total-calculado" style="display:none;margin:-4px 0 16px;padding:8px 14px;background:var(--accent)15;border:1px solid var(--accent)33;border-radius:8px;font-size:13px;font-weight:600;color:var(--accent);"></div>

      <div id="mg-inicio-row" style="display:none;margin-bottom:16px;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:12px 16px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;">
            Mês de início das parcelas
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div>
              <label class="form-label" for="mg_mes_inicio">Mês da 1ª Parcela</label>
              <select name="mes_inicio" id="mg_mes_inicio" class="form-control" onchange="mgAtualizarPreview()">
                {% for val, label in modal_gasto_form.mes_inicio.field.choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div>
              <label class="form-label" for="mg_ano_inicio">Ano</label>
              <select name="ano_inicio" id="mg_ano_inicio" class="form-control" onchange="mgAtualizarPreview()">
                {% for val, label in modal_gasto_form.ano_inicio.field.choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div id="mg-preview-parcelas" style="display:none;margin-top:10px;align-items:center;flex-wrap:wrap;gap:6px;">
            <span id="mg-pp-primeira" style="font-size:12px;font-weight:600;color:var(--accent);"></span>
            <span id="mg-pp-arrow" style="font-size:12px;color:var(--text-muted);">→</span>
            <span id="mg-pp-ultima"  style="font-size:12px;font-weight:600;color:var(--accent);"></span>
            <span id="mg-pp-total"   style="font-size:11px;background:var(--accent)20;color:var(--accent);border-radius:4px;padding:1px 6px;"></span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="mg_categoria">Categoria</label>
        <select name="categoria" id="mg_categoria" class="form-control">
          <option value="">— Sem categoria —</option>
          {% for c in modal_gasto_form.categoria.field.queryset %}
          <option value="{{ c.pk }}">{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Divisão de gastos -->
      <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0;">
          <input type="checkbox" name="dividir_gasto" id="mg_dividir_gasto" onchange="mgToggleDividir(this.checked)"
                 style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);">Dividir este gasto</span>
        </label>

        <div id="mg-dividir-opcoes" style="display:none;margin-top:12px;">
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label" style="font-size:12px;">Dividir com</label>
            <select name="dividir_com" id="mg_dividir_com" class="form-control" onchange="mgAtualizarDivisao()">
              <option value="">— Selecione o responsável —</option>
              {% for r in modal_gasto_form.dividir_com.field.queryset %}
              <option value="{{ r.pk }}">{{ r }}</option>
              {% endfor %}
            </select>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;">
            <div>
              <label class="form-label" style="font-size:12px;">Minha parte</label>
              <select name="pct_responsavel" id="mg_pct_responsavel" class="form-control" onchange="mgAtualizarDivisao()">
                {% for val, label in modal_gasto_form.pct_responsavel.field.choices %}
                <option value="{{ val }}" {% if val == "50" %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div>
              <label class="form-label" style="font-size:12px;color:var(--text-muted);">Parte de <span id="mg_label_dividir_com">quem divide</span></label>
              <div id="mg_pct_outro_display" style="height:38px;display:flex;align-items:center;font-weight:600;font-size:15px;color:var(--accent);">50%</div>
            </div>
          </div>

          <div style="height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-bottom:10px;">
            <div id="mg_barra_pct" style="height:100%;background:var(--accent);transition:width .2s;width:50%;"></div>
          </div>

          <div id="mg-divisao-preview" style="display:none;display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;">
            <div style="background:var(--accent)11;border-radius:8px;padding:8px 10px;">
              <div style="font-size:11px;color:var(--text-muted);" id="mg_label_preview_meu">Você</div>
              <div style="font-size:16px;font-weight:800;color:var(--accent);" id="mg_valor_preview_meu">R$ —</div>
            </div>
            <div style="background:#818cf811;border-radius:8px;padding:8px 10px;">
              <div style="font-size:11px;color:var(--text-muted);" id="mg_label_preview_outro">Outro</div>
              <div style="font-size:16px;font-weight:800;color:#818cf8;" id="mg_valor_preview_outro">R$ —</div>
            </div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button type="button" onclick="closeFormModal('modal-novo-gasto')" class="btn btn-danger">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          <i data-lucide="save"></i> Salvar Gasto
        </button>
      </div>
    </form>
  </div>
</div>
<script>
var _mgMesesCompletos = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function mgGastoTipoToggle(tipo) {
  var TIPOS_C = ['credito_avista', 'credito_parcelado'];
  var isC = TIPOS_C.indexOf(tipo) !== -1;
  var isP = tipo === 'credito_parcelado';
  var el;
  el = document.getElementById('mg-cartao-row');   if (el) el.style.display = isC ? 'block' : 'none';
  el = document.getElementById('mg-parcelas-row'); if (el) el.style.display = isP ? 'block' : 'none';
  el = document.getElementById('mg-inicio-row');   if (el) el.style.display = isP ? 'block' : 'none';
  el = document.getElementById('mg_label_valor');  if (el) el.textContent   = isP ? 'Valor da Parcela (R$) *' : 'Valor Total (R$) *';

  // Posicionamento explícito no grid (sem mover DOM)
  var dataRow = document.getElementById('mg-data-row');
  if (dataRow) {
    dataRow.style.gridColumn = isP ? '1 / -1' : '2';
    dataRow.style.gridRow    = isP ? '2'       : '1';
  }

  mgAtualizarTotal();
  mgAtualizarPreview();
}

function mgAtualizarPreview() {
  var tipo  = document.getElementById('mg_tipo_pagamento');
  var preview = document.getElementById('mg-preview-parcelas');
  if (!preview) return;
  if (!tipo || tipo.value !== 'credito_parcelado') { preview.style.display = 'none'; return; }

  var selMes = document.getElementById('mg_mes_inicio');
  var selAno = document.getElementById('mg_ano_inicio');
  var parc   = document.getElementById('mg_total_parcelas');
  var mes    = parseInt(selMes ? selMes.value : 0) || 0;
  var ano    = parseInt(selAno ? selAno.value : 0) || 0;
  var n      = parseInt(parc   ? parc.value   : 0) || 0;
  if (!mes || !ano) { preview.style.display = 'none'; return; }

  var pp    = document.getElementById('mg-pp-primeira');
  var arrow = document.getElementById('mg-pp-arrow');
  var pu    = document.getElementById('mg-pp-ultima');
  var pt    = document.getElementById('mg-pp-total');

  if (pp) pp.textContent = '1ª parcela: ' + _mgMesesCompletos[mes - 1] + '/' + ano;
  if (n > 0) {
    var mU = ((mes - 1 + n - 1) % 12) + 1;
    var aU = ano + Math.floor((mes - 1 + n - 1) / 12);
    if (arrow) arrow.style.display = '';
    if (pu)    { pu.textContent = 'Última: ' + _mgMesesCompletos[mU - 1] + '/' + aU; pu.style.display = ''; }
    if (pt)    { pt.textContent = n + 'x no total'; pt.style.display = ''; }
  } else {
    if (arrow) arrow.style.display = 'none';
    if (pu)    { pu.textContent = ''; pu.style.display = 'none'; }
    if (pt)    { pt.textContent = ''; pt.style.display = 'none'; }
  }
  preview.style.display = 'flex';
}

function mgAtualizarTotal() {
  var tipo  = document.getElementById('mg_tipo_pagamento');
  var val   = document.getElementById('mg_valor_total');
  var parc  = document.getElementById('mg_total_parcelas');
  var el    = document.getElementById('mg-total-calculado');
  if (!el) return;
  if (!tipo || tipo.value !== 'credito_parcelado') { el.style.display = 'none'; return; }
  var v = parseFloat((val ? val.value : '0') || 0);
  var n = parseInt((parc ? parc.value : '0') || 0, 10);
  if (v > 0 && n > 0) {
    var total = v * n;
    el.textContent = '💳 Total da compra: R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2}) +
                     '  (' + n + 'x de R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2}) + ')';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function mgToggleDividir(checked) {
  var el = document.getElementById('mg-dividir-opcoes');
  if (el) el.style.display = checked ? 'block' : 'none';
  if (checked) mgAtualizarDivisao();
}

function mgAtualizarDivisao() {
  var selPct    = document.getElementById('mg_pct_responsavel');
  var selCom    = document.getElementById('mg_dividir_com');
  var selResp   = document.getElementById('mg_responsavel');
  var pctMeu    = parseInt(selPct ? selPct.value : 50, 10) || 50;
  var pctOutro  = 100 - pctMeu;

  var pctOutroEl = document.getElementById('mg_pct_outro_display');
  var barraEl    = document.getElementById('mg_barra_pct');
  var labelCom   = document.getElementById('mg_label_dividir_com');
  var labelMeu   = document.getElementById('mg_label_preview_meu');
  var labelOutro = document.getElementById('mg_label_preview_outro');
  var valMeuEl   = document.getElementById('mg_valor_preview_meu');
  var valOutroEl = document.getElementById('mg_valor_preview_outro');
  var previewDiv = document.getElementById('mg-divisao-preview');
  var inputVal   = document.getElementById('mg_valor_total');

  if (pctOutroEl) pctOutroEl.textContent = pctOutro + '%';
  if (barraEl)    barraEl.style.width    = pctMeu + '%';

  var nomeCom  = selCom  && selCom.selectedIndex  > 0 ? selCom.options[selCom.selectedIndex].text.trim()  : 'Outro';
  var nomeResp = selResp && selResp.selectedIndex > 0 ? selResp.options[selResp.selectedIndex].text.trim() : 'Você';
  if (labelCom)   labelCom.textContent   = nomeCom;
  if (labelMeu)   labelMeu.textContent   = nomeResp  + ' (' + pctMeu   + '%)';
  if (labelOutro) labelOutro.textContent = nomeCom   + ' (' + pctOutro + '%)';

  var val = parseFloat((inputVal ? inputVal.value : '0').replace(',', '.')) || 0;
  if (val > 0 && previewDiv) {
    var vMeu   = Math.round(val * pctMeu   / 100 * 100) / 100;
    var vOutro = Math.round((val - vMeu)   * 100) / 100;
    var fmt = function(n) { return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
    if (valMeuEl)   valMeuEl.textContent   = fmt(vMeu);
    if (valOutroEl) valOutroEl.textContent = fmt(vOutro);
    previewDiv.style.display = 'grid';
  } else if (previewDiv) {
    previewDiv.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var inp   = document.getElementById('mg_valor_total');
  var parc  = document.getElementById('mg_total_parcelas');
  var selR  = document.getElementById('mg_responsavel');
  var chkD  = document.getElementById('mg_dividir_gasto');

  if (inp) inp.addEventListener('input', function() {
    mgAtualizarTotal();
    if (chkD && chkD.checked) mgAtualizarDivisao();
  });
  if (parc) parc.addEventListener('input', function() {
    mgAtualizarTotal();
    mgAtualizarPreview();
  });
  if (selR) selR.addEventListener('change', function() {
    if (chkD && chkD.checked) mgAtualizarDivisao();
  });

  // inicializa mês/ano com valor atual
  var now = new Date();
  var selM = document.getElementById('mg_mes_inicio');
  var selA = document.getElementById('mg_ano_inicio');
  if (selM) selM.value = now.getMonth() + 1;
  if (selA) selA.value = now.getFullYear();
});
</script>
