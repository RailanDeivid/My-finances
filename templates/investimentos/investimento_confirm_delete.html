{% extends "base_dialog.html" %}
{% block title %}Excluir Investimento — MyFinances{% endblock %}

{% block dialog_content %}
<div class="dialog-icon"><i data-lucide="trash-2"></i></div>
<div class="dialog-title">Excluir Investimento</div>
<div class="dialog-body">
  Confirma a exclusão de <strong>{{ object.descricao }}</strong>?<br>
  <span style="font-size:12px;">Todo o histórico de movimentações será removido permanentemente.</span>
</div>
<form method="post">
  {% csrf_token %}
  <div class="dialog-actions">
    <a href="{% url 'investimento-list' %}" class="btn btn-danger">Cancelar</a>
    <button type="submit" class="btn btn-primary"><i data-lucide="trash-2"></i> Confirmar</button>
  </div>
</form>
{% endblock %}
